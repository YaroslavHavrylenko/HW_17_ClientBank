version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: clientbank_db
    environment:
      POSTGRES_DB: clientbank
      POSTGRES_USER: Нфкщідфм
      POSTGRES_PASSWORD:
    ports:
      - "9000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
