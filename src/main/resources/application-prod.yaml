spring:
  datasource:
    url: ${PROD_DB_URL:jdbc:mysql://localhost:3306/clientbank}
    username: ${PROD_DB_USERNAME:appuser}
    password: ${PROD_DB_PASSWORD:apppass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterWrite=3600s
